version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Zurich
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions

  # ── Docker base images ────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Zurich
    labels:
      - dependencies
      - docker

  # ── Python packages ───────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /app/src
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Zurich
    groups:
      python-deps:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
