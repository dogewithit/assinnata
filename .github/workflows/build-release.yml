---
# ─────────────────────────────────────────────────────────────────────────────
# Build & Release Pipeline
#
# Runs on FEATURE BRANCHES ONLY — never on master/main.
# master is exclusively managed by ArgoCD.
#
# Flow (triggered on push to any non-master branch, app/** changed):
#   1. detect-changes  → check if app/** actually changed (skip helm-only pushes)
#   2. build           → docker build + push to GHCR (full git SHA tag)
#   3. update-helm     → bump image.tag in helm/<service>/values.yaml
#                        commit "[skip ci]" back to the feature branch
#
# On PR merge to master:
#   • NO pipeline runs on master
#   • ArgoCD detects the updated values.yaml and auto-syncs the cluster
#
# Loop-prevention:
#   • branches-ignore: [master, main] — pipeline never fires on master
#   • path filter app/**              — helm write-back doesn't match, safe
#   • [skip ci] in write-back commit  — second guard for the feature branch loop
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    branches-ignore:
      - master
      - main
    paths:
      - "app/**"

# One build per branch at a time; cancel older run if a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Global defaults ──────────────────────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write   # push helm write-back commit to feature branch
  packages: write   # push image to GHCR

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Detect which services actually changed ───────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.filter.outputs.app }}
      matrix:      ${{ steps.build-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - "app/**"

      - name: Build job matrix
        id: build-matrix
        run: |
          services='["app"]'
          echo "matrix={\"service\":${services}}" >> "$GITHUB_OUTPUT"

  # ── 2. Build Docker image and push to GHCR ─────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: full SHA (used in Helm), short SHA, branch name
      # "latest" tag is intentionally omitted — only meaningful on master
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=sha,format=long,prefix=
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file:    ./${{ matrix.service }}/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true
          sbom:       true

      - name: Export image tag
        id: export-tag
        run: |
          echo "IMAGE_TAG=${{ github.sha }}"
          echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ── 3. Write image SHA back to helm values on this feature branch ───────────
  # The updated values.yaml is included in the PR and lands on master at merge.
  # ArgoCD detects the master change and syncs — no pipeline runs on master.
  update-helm:
    name: Helm tag update (${{ matrix.service }})
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull latest to avoid conflicts
        run: git pull --rebase origin "${{ github.ref_name }}"

      - name: Install yq
        uses: mikefarah/yq@v4.40.5

      - name: Update image tag in Helm values
        id: helm-update
        env:
          SERVICE:   ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          VALUES_FILE="helm/${SERVICE}/values.yaml"
          echo "Patching ${VALUES_FILE} → image.tag=${IMAGE_TAG}"
          yq e ".image.tag = \"${IMAGE_TAG}\"" -i "${VALUES_FILE}"
          echo "values_file=${VALUES_FILE}" >> "$GITHUB_OUTPUT"

      # Commit back to the feature branch with [skip ci] to prevent loop.
      # This commit will be included in the PR and merged to master,
      # where ArgoCD picks it up and syncs the cluster.
      - name: Commit and push Helm update to feature branch
        env:
          IMAGE_TAG:   ${{ github.sha }}
          SERVICE:     ${{ matrix.service }}
          VALUES_FILE: ${{ steps.helm-update.outputs.values_file }}
          BRANCH:      ${{ github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${VALUES_FILE}"

          if git diff --cached --quiet; then
            echo "Helm values already up to date — skipping commit."
            exit 0
          fi

          # [skip ci] prevents this commit from re-triggering the build loop
          git commit -m "chore(helm): update ${SERVICE} image.tag to ${IMAGE_TAG} [skip ci]

          Automated update by GitHub Actions build #${{ github.run_number }}.
          Source commit: ${{ github.sha }}
          Branch: ${BRANCH}
          "

          git push origin "${BRANCH}"

      - name: Annotate job summary
        run: |
          echo "### Helm Tag Update" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service     | \`${{ matrix.service }}\`                               |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag   | \`${{ github.sha }}\`                                   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch      | \`${{ github.ref_name }}\`                              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Next step   | Merge PR → ArgoCD detects master change → auto-sync    |" >> "$GITHUB_STEP_SUMMARY"
